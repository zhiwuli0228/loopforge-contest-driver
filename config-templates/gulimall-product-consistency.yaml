# LoopForge E2E config template for Gulimall product consistency checks.
# Copy this file to loopforge.config.yaml before local E2E execution.
# Do not commit local code/ target project contents.

platform:
  layout: "single-root"
  work_dir: "."
  code_dir: "code"
  artifact_dir: ".loopforge"
  official_submission_os: "linux"
  local_development_os:
    - "windows"
    - "linux"

task:
  name: "gulimall-product-attr-consistency-e2e"
  mode: "consistency-check"
  profile: "profiles/examples/java-consistency-check.yaml"
  language:
    primary: "java"
    secondary: []
  objective: "Check frozen design docs against gulimall-product attribute and attribute-group implementation, repair minimal drift, and verify with Maven."

execution:
  unattended: true
  max_repair_rounds: 2
  fail_soft: true
  always_finalize: true
  allow_code_generation: true
  allow_static_rule_modification: false
  commit: false
  push: false
  create_pr: false

verification:
  source: "human-configured"
  working_directory: "code"
  timeout_seconds: 300
  commands:
    default:
      - "mvn -pl gulimall-product -am -DskipTests package"
    linux:
      - "mvn -pl gulimall-product -am -DskipTests package"
    windows:
      - "mvn -pl gulimall-product -am -DskipTests package"

outputs:
  final_report: "code/.loopforge/reports/final-report.md"
  patch_snapshot_dir: "code/.loopforge/snapshots"
