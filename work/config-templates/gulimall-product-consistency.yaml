# LoopForge E2E config template for Gulimall product consistency checks.
# Copy this file to work/loopforge.config.yaml before local E2E execution.
# Do not commit local code/ target project contents unless the contest explicitly requires it.
#
# Expected code/ layout before use:
# - code/pom.xml
# - code/gulimall-common/
# - code/gulimall-product/
# - code/docs/

platform:
  layout: "single-root"
  work_dir: "."
  code_dir: "code"
  artifact_dir: ".loopforge"
  official_submission_os: "linux"
  local_development_os:
    - "windows"
    - "linux"

task:
  name: "gulimall-product-attr-consistency-e2e"
  mode: "consistency-check"
  profile: "profiles/examples/java-consistency-check.yaml"
  language:
    primary: "java"
    secondary: []
  objective: "Check consistency between frozen design documents and implementation for gulimall-product attribute and attribute-group rules, detect controlled drifts, repair minimal code, add tests or verification evidence, and verify with Maven."

execution:
  unattended: true
  execution_model: "delegated-staged"
  human_intervention_allowed: false
  manual_stage_prompt_allowed: false
  monolithic_context_forbidden: true
  file_handoff_required: true
  max_repair_rounds: 2
  fail_soft: true
  always_finalize: true
  allow_code_generation: true
  allow_static_rule_modification: false
  commit: false
  push: false
  create_pr: false

governance:
  superspec: "profiles/superspec/consistency-check-stages.yaml"
  superpower: "profiles/superpower/consistency-check-guards.yaml"
  mode_rules:
    - "rules/loopforge/modes/consistency-check/delegated-execution.md"

coding_skill:
  enabled: true
  required: true
  skill: "skills/code-implementation/SKILL.md"
  apply_at:
    - "patch_implementation"
  output: "code/.loopforge/consistency/05-patch-summary.md"
  replacement_policy: "This generic coding skill may be replaced by a stronger coding skill without changing LoopForge orchestration, as long as the replacement preserves the same input contract, output artifact path, and gate values."

verification:
  source: "human-configured"
  working_directory: "code"
  timeout_seconds: 300
  commands:
    default:
      - "mvn -pl gulimall-product -am -DskipTests package"
    linux:
      - "mvn -pl gulimall-product -am -DskipTests package"
    windows:
      - "mvn -pl gulimall-product -am -DskipTests package"

outputs:
  consistency_dir: "code/.loopforge/consistency"
  final_report: "code/.loopforge/reports/final-report.md"
  patch_snapshot_dir: "code/.loopforge/snapshots"
