framework:
  name: "loopforge-contest-driver"
  input_model: "source-readme"
  default_mode: "feature-development"

platform:
  layout: "single-root"
  work_dir: "work"
  code_dir: "code"
  local_fallback_source_dir: "code"
  artifact_dir: ".loopforge"
  official_submission_os: "linux"
  local_development_os:
    - "windows"
    - "linux"

source:
  root_env: "SOURCE_ROOT"
  readme_required: true
  readme_candidates:
    - "README.md"
    - "README"
    - "readme.md"
    - "Readme.md"

task:
  name: "source-readme-driven-execution"
  mode: "feature-development"
  source: "source-readme"
  readme_required: true
  profile: "profiles/templates/feature-development.yaml"
  language:
    primary: "source-root-derived"
    secondary: []
  objective: "derive task intent from the README under SOURCE_ROOT"

execution:
  unattended: true
  allow_manual_interaction: false
  max_repair_rounds: 2
  fail_soft: true
  always_finalize: true
  allow_code_generation: true
  allow_static_rule_modification: false
  commit: false
  push: false
  create_pr: false

mode_selection:
  source: "source-readme"
  fallback: "feature-development"

coding_skill:
  enabled: true
  required: true
  skill: "skills/code-implementation/SKILL.md"
  apply_at:
    - "patch_implementation"
  output: "SOURCE_ROOT/.loopforge/consistency/05-patch-summary.md"

verification:
  source: "source-readme-or-framework-default"
  working_directory: "SOURCE_ROOT"
  timeout_seconds: 300
  commands:
    default: []

outputs:
  result_report: "result/output.md"
  issue_summary: "result/issues/00-summary.md"
  trace_dir: "logs/trace"
  interaction_log: "logs/interaction.md"
  consistency_dir: "SOURCE_ROOT/.loopforge/consistency"
  final_report: "SOURCE_ROOT/.loopforge/reports/final-report.md"
  patch_snapshot_dir: "SOURCE_ROOT/.loopforge/snapshots"
