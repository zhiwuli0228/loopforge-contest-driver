framework:
  name: "loopforge-contest-driver"
  input_model: "preloaded-design-plus-source"
  default_mode: "migration"

platform:
  layout: "single-root"
  work_dir: "work"
  windows_code_dir: "work/code"
  linux_source_root_env: "SOURCE_ROOT"
  artifact_dir: "logs/trace"
  official_submission_os: "linux"
  local_development_os:
    - "windows"
    - "linux"

source:
  root_env: "SOURCE_ROOT"

design:
  readme: "work/design/README.md"
  required: true
  authoritative: true

task:
  name: "preloaded-design-driven-execution"
  mode: "migration"
  source: "preloaded-design"
  profile: "profiles/examples/c-to-rust-migration.yaml"

language:
  primary: "c"
  secondary:
    - "rust"

objective: "derive C-to-Rust migration requirements from work/design/README.md and migrate the read-only SOURCE_ROOT project"

execution:
  unattended: true
  allow_manual_interaction: false
  max_repair_rounds: 3
  max_semantic_repair_rounds: 2
  # Optional unattended agent/fixer executable. It receives the task JSON path
  # as argv and through LOOPFORGE_REPAIR_TASK; env LOOPFORGE_REPAIR_COMMAND
  # overrides this setting on both Windows and Linux.
  repair_provider:
    enabled: "auto"
    command: null
  fail_soft: true
  always_finalize: true
  allow_code_generation: true
  allow_static_rule_modification: false
  commit: false
  push: false
  create_pr: false

mode_selection:
  source: "preloaded-design"
  fallback: "migration"

coding_skill:
  enabled: true
  required: true
  skill: "skills/c-to-rust-migration/SKILL.md"
  apply_at:
    - "source_inventory"
    - "api_mapping"
    - "migration_plan"
    - "rust_project_generation"
    - "test_migration"
    - "verification"
  output: "work/logs/trace/c-to-rust/05-migration-summary.md"

verification:
  source: "profile-or-framework-default"
  working_directory: "DESIGN_DERIVED_OUTPUT_PROJECT"
  timeout_seconds: 600
  commands:
    default:
      - "cargo build"
      - "cargo test"

outputs:
  result_report: "work/result/output.md"
  issue_summary: "work/result/issues/00-summary.md"
  trace_dir: "work/logs/trace"
  interaction_log: "work/logs/interaction.md"
  migration_dir: "work/logs/trace/c-to-rust"
  source_inventory: "work/logs/trace/c-to-rust/01-source-inventory.md"
  api_mapping: "work/logs/trace/c-to-rust/02-api-mapping.md"
  migration_plan: "work/logs/trace/c-to-rust/03-migration-plan.md"
  implementation_summary: "work/logs/trace/c-to-rust/05-migration-summary.md"
  verification_report: "work/logs/trace/c-to-rust/06-verification-report.md"
  unsafe_report: "work/logs/trace/c-to-rust/unsafe-ratio.json"
  final_report: "work/logs/trace/final-report.md"
