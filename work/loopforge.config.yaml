# Human-maintained configuration.
# Agent must not modify this file during execution.

platform:
  layout: "single-root"
  work_dir: "work"
  code_dir: "code"
  local_fallback_source_dir: "code"
  artifact_dir: ".loopforge"
  official_submission_os: "linux"
  local_development_os:
    - "windows"
    - "linux"

task:
  name: "source-readme-driven-development"
  mode: "feature-development"
  source: "source-readme"
  readme_required: true
  profile: "profiles/templates/feature-development.yaml"
  language:
    primary: "source-root-derived"
    secondary: []
  objective: "derive task intent from SOURCE_ROOT README"

execution:
  unattended: true
  max_repair_rounds: 2
  fail_soft: true
  always_finalize: true
  allow_code_generation: true
  allow_static_rule_modification: false
  commit: false
  push: false
  create_pr: false

coding_skill:
  enabled: true
  required: true
  skill: "skills/code-implementation/SKILL.md"
  apply_at:
    - "patch_implementation"
  output: "code/.loopforge/consistency/05-patch-summary.md"

verification:
  source: "source-readme-or-framework-default"
  working_directory: "code"
  timeout_seconds: 300
  commands:
    default: []

outputs:
  result_report: "result/output.md"
  issue_summary: "result/issues/00-summary.md"
  trace_dir: "logs/trace"
  consistency_dir: "code/.loopforge/consistency"
  final_report: "code/.loopforge/reports/final-report.md"
  patch_snapshot_dir: "code/.loopforge/snapshots"
