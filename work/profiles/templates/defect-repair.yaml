profile:
  name: "defect-repair-template"
  class: "template"
  intent: "starting point for minimal, evidence-driven bug fixing"

task:
  mode: "defect-repair"
  objective: "describe the failing behavior here"
  language:
    primary: "source-root-derived"
    secondary: []
  profile_role: "minimal defect repair"

inputs:
  required:
    - "bug report or failing behavior statement"
  optional:
    - "reproduction steps"
    - "failing test case"
    - "stack trace or logs"

execution:
  require_failure_diagnosis: true
  require_root_cause_statement: true
  prefer_minimal_patch: true
  allow_unrelated_refactor: false

verification:
  strategy: "preloaded-design-or-framework-default"
  evidence_focus:
    - "failure addressed"
    - "regression confidence"
  commands: []

reporting:
  highlight:
    - "root cause"
    - "minimal patch rationale"
    - "residual risk"
