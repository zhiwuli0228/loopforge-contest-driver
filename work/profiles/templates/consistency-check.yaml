profile:
  name: "consistency-check-template"
  class: "template"
  intent: "starting point for design-versus-implementation analysis"

task:
  mode: "consistency-check"
  objective: "describe the design contract to compare"
  language:
    primary: "source-root-derived"
    secondary: []
  profile_role: "design implementation analysis"

inputs:
  required:
    - "design source or contract"
    - "implementation scope to inspect"
  optional:
    - "traceability expectations"
    - "repair authorization"

execution:
  analysis_first: true
  controlled_repair_default: false
  require_traceability_matrix: true
  drift_classification:
    - "missing implementation"
    - "behavior mismatch"
    - "naming or structure drift"
    - "design ambiguity"

verification:
  strategy: "source-readme-or-framework-default"
  evidence_focus:
    - "traceability quality"
    - "drift classification"
  commands: []

reporting:
  highlight:
    - "drift categories"
    - "evidence mapping"
    - "optional repair scope"
