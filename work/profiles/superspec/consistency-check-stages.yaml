superspec:
  name: "consistency-check-stages"
  version: "1.0"
  purpose: "Define staged work packets for unattended consistency-check execution."
  artifact_root: "work/logs/trace/consistency"
  final_report: "work/logs/trace/final-report.md"
  subagent_required: true
  fallback_to_main_context_allowed: false
  missing_subagent_policy: "BLOCKED_WITH_REPORT"
  parent_direct_execution_allowed: false
  file_handoff_required: true

artifact_metadata_contract:
  required_fields:
    - "stage_id"
    - "executed_by_subagent"
    - "parent_direct_execution"
    - "input_files_read"
    - "output_artifact"
    - "gate"
    - "summary"
    - "next_stage"

final_report_evidence:
  required_section: "## Subagent Execution Evidence"
  invalid_run_result: "INVALID_RUN_MONOLITHIC_MAIN_CONTEXT"

stages:
  - id: "00-preflight"
    name: "Preflight"
    subagent: "opencode-preflight-subagent"
    input:
      - "INSTRUCTION.md"
      - "loopforge.config.yaml"
      - "skills/loopforge-driver/SKILL.md"
      - "work/design/README.md"
    output: "work/logs/trace/consistency/00-preflight-report.md"
    parent_direct_execution_allowed: false
    success_gate: "READY_FOR_DESIGN_READ"
    failure_gate: "BLOCKED_WITH_REPORT"
    blocked_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: false

  - id: "01-design-read"
    name: "Design Read"
    subagent: "opencode-design-read-subagent"
    input:
      - "work/design/README.md"
    output: "work/logs/trace/consistency/01-design-summary.md"
    parent_direct_execution_allowed: false
    success_gate: "READY_FOR_IMPLEMENTATION_MAPPING"
    failure_gate: "BLOCKED_WITH_REPORT"
    blocked_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: false

  - id: "02-implementation-map"
    name: "Implementation Mapping"
    subagent: "opencode-implementation-map-subagent"
    input:
      - "work/logs/trace/consistency/01-design-summary.md"
      - "SOURCE_ROOT/**"
    output: "work/logs/trace/consistency/02-implementation-mapping.md"
    parent_direct_execution_allowed: false
    success_gate: "READY_FOR_DRIFT_ANALYSIS"
    failure_gate: "BLOCKED_WITH_REPORT"
    blocked_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: false

  - id: "03-drift-analyze"
    name: "Drift Analysis"
    subagent: "opencode-drift-analysis-subagent"
    input:
      - "work/logs/trace/consistency/01-design-summary.md"
      - "work/logs/trace/consistency/02-implementation-mapping.md"
    output: "work/logs/trace/consistency/03-drift-report.md"
    parent_direct_execution_allowed: false
    success_gate: "READY_FOR_REPAIR_PLAN"
    failure_gate: "BLOCKED_WITH_REPORT"
    blocked_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: false

  - id: "04-repair-plan"
    name: "Repair Planning"
    subagent: "opencode-repair-plan-subagent"
    input:
      - "work/logs/trace/consistency/03-drift-report.md"
      - "work/logs/trace/consistency/02-implementation-mapping.md"
      - "loopforge.config.yaml"
    output: "work/logs/trace/consistency/04-repair-plan.md"
    parent_direct_execution_allowed: false
    success_gate: "READY_FOR_PATCH"
    failure_gate: "BLOCKED_WITH_REPORT"
    blocked_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: false

  - id: "05-patch"
    name: "Patch Implementation"
    subagent: "opencode-patch-subagent"
    skill: "skills/code-implementation/SKILL.md"
    input:
      - "work/logs/trace/consistency/04-repair-plan.md"
      - "profiles/superpower/consistency-check-guards.yaml"
      - "skills/code-implementation/SKILL.md"
    optional_input:
      - "skills/code-implementation/references/java-secure-coding.md"
      - "skills/code-implementation/references/minimal-patch-rules.md"
      - "skills/code-implementation/references/patch-summary-template.md"
    output: "work/logs/trace/consistency/05-patch-summary.md"
    parent_direct_execution_allowed: false
    success_gate: "READY_FOR_VERIFICATION"
    degraded_gate: "DEGRADED_BUT_READY_FOR_VERIFICATION"
    failure_gate: "BLOCKED_WITH_REPORT"
    blocked_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: true

  - id: "06-verify"
    name: "Verification"
    subagent: "opencode-verification-subagent"
    input:
      - "loopforge.config.yaml"
      - "work/logs/trace/consistency/05-patch-summary.md"
    output: "work/logs/trace/consistency/06-verification-report.md"
    parent_direct_execution_allowed: false
    success_gate: "READY_FOR_FINAL_REPORT"
    degraded_gate: "DEGRADED_BUT_READY_FOR_FINAL_REPORT"
    failure_gate: "BLOCKED_WITH_REPORT"
    blocked_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: false

  - id: "07-final-report"
    name: "Final Report"
    subagent: "opencode-final-report-subagent"
    input:
      - "work/logs/trace/consistency/*.md"
    output: "work/logs/trace/final-report.md"
    parent_direct_execution_allowed: false
    success_gate: "FINAL_REPORT_READY"
    failure_gate: "BLOCKED_WITH_REPORT"
    can_modify_code: false
