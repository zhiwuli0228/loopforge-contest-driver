superpower:
  name: "consistency-check-guards"
  version: "1.0"
  purpose: "Guardrails for unattended delegated consistency-check execution."

execution:
  unattended: true
  human_intervention_allowed: false
  manual_stage_prompt_allowed: false
  monolithic_execution_forbidden: true
  staged_execution_required: true
  subagent_required: true
  fallback_to_main_context_allowed: false
  missing_subagent_policy: "BLOCKED_WITH_REPORT"
  parent_direct_execution_allowed: false
  artifact_handoff_required: true
  file_handoff_required: true
  max_repair_rounds: 2

context:
  return_full_analysis_to_orchestrator: false
  use_file_artifacts_as_memory: true
  stage_context_must_be_bounded: true

read_permissions:
  allowed:
    - "INSTRUCTION.md"
    - "loopforge.config.yaml"
    - "skills/**"
    - "rules/**"
    - "profiles/**"
    - "runtime/**"
    - "scripts/**"
    - "SOURCE_ROOT/**"
    - "work/logs/trace/**"

write_permissions:
  read_only:
    - "INSTRUCTION.md"
    - "loopforge.config.yaml"
    - "skills/**"
    - "rules/**"
    - "profiles/**"
    - "runtime/**"
    - "scripts/**"
  writable:
    - "SOURCE_ROOT/**"
    - "work/logs/trace/**"
  forbidden:
    - "INSTRUCTION.md"
    - "loopforge.config.yaml"
    - "skills/**"
    - "rules/**"
    - "profiles/**"
    - "runtime/**"
    - "scripts/**"

verification:
  command_source: "loopforge.config.yaml"
  command_guessing_forbidden: true
  degraded_verification_allowed: true
  require_stdout_stderr_summary: true
  require_exit_code: true

repair:
  repair_plan_required: true
  patch_without_plan_forbidden: true
  modify_only_plan_listed_files: true
  large_scale_rewrite_forbidden: true
  unrelated_refactor_forbidden: true

coding_skill_policy:
  enabled: true
  required_for_patch: true
  skill: "skills/code-implementation/SKILL.md"
  missing_skill_policy: "BLOCKED_WITH_REPORT"
  allowed_stage:
    - "05-patch"
  output_required:
    - "work/logs/trace/consistency/05-patch-summary.md"
  patch_summary_must_include:
    - "applied skill path"
    - "modified files"
    - "repair-plan items implemented"
    - "security-sensitive areas touched"
    - "deviations from repair plan"
    - "gate status"
  write_permissions:
    allowed:
      - "SOURCE_ROOT/**"
      - "work/logs/trace/**"
    forbidden:
      - "INSTRUCTION.md"
      - "loopforge.config.yaml"
      - "skills/**"
      - "rules/**"
      - "profiles/**"
      - "runtime/**"
      - "scripts/**"

git:
  add_allowed: false
  commit_allowed: false
  push_allowed: false
  pr_allowed: false
