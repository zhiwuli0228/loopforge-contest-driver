profile:
  name: "stack-modernization-example"
  class: "example"
  intent: "illustrate a bounded compatibility-aware migration"

task:
  name: "stack-modernization-example"
  mode: "migration"
  objective: "modernize a bounded component while preserving observable contracts"
  language:
    primary: "source-root-derived"
    secondary: []
  profile_role: "stack migration"

inputs:
  required:
    - "source module inventory"
    - "behavioral compatibility expectations"
  optional:
    - "interface boundary notes"
    - "performance budget"
    - "risk register"

execution:
  require_source_inventory: true
  require_compatibility_contract: true
  allow_behavior_preserving_refactor: true
  migration_focus:
    - "interface containment"
    - "compatibility preservation"
    - "incremental rollout"

verification:
  strategy: "source-readme-or-framework-default"
  working_directory_hint: "SOURCE_ROOT"
  evidence_focus:
    - "compatibility preservation"
    - "migration boundary safety"
  commands:
    - "configure-this-for-your-project"

reporting:
  highlight:
    - "migrated surface area"
    - "compatibility decisions"
    - "deferred migration risks"
