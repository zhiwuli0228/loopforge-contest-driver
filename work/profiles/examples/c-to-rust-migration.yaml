profile:
  name: "c-to-rust-migration"
  mode: "migration"
  intent: "Convert a README-described C source project and its tests into a buildable Rust project."

migration_defaults:
  source_project_name: "source_project"
  source_language: "c"
  target_language: "rust"
  output_project_name: "c_to_rust_output"
  source_dirs:
    - "src"
    - "source"
  test_dirs:
    - "tests"
    - "test"
  build_commands:
    - "cargo build"
    - "cargo test"
  unsafe_ratio_max: 0.10
  api_name_hints: []
  module_hints: []

source_contract:
  source_strategy: "source-readme-driven-execution"
  readme_candidates:
    - "README.md"
    - "README"
    - "READNE.md"
    - "readme.md"
    - "Readme.md"
  source_readonly: true
  invalid_source_root:
    - "work/code/README.md"

migration_contract:
  semantic_gate_required: true
  test_policy: "migrate-or-equivalent-coverage"
  disallowed_placeholders:
    - "todo!()"
    - "unimplemented!()"

execution_contract:
  unattended: true
  manual_interaction_allowed: false
  owner: "loopforge execution orchestrator"
  repair_loop_required: true
  write_scope:
    allowed:
      - "<runtime-derived-output-project>/**"
      - "work/result/**"
      - "work/logs/**"
    forbidden:
      - "SOURCE_ROOT/**"
      - "runtime artifacts inside SOURCE_ROOT"

verification_contract:
  working_directory: "<runtime-derived-output-project>"
  commands:
    - "cargo build"
    - "cargo test"
  required_checks:
    - "output Cargo.toml exists"
    - "output src exists"
    - "output tests exists"
    - "unsafe ratio < configured maximum"
    - "semantic gate passes before READY"
    - "tests contain assertions"
    - "crate is non-empty"

reporting_contract:
  required_files:
    - "work/result/output.md"
    - "work/result/issues/00-summary.md"
    - "work/logs/interaction.md"
    - "work/logs/trace/final-report.md"
    - "work/logs/trace/c-to-rust/01-source-inventory.md"
    - "work/logs/trace/c-to-rust/05-migration-summary.md"
    - "work/logs/trace/c-to-rust/06-verification-report.md"
    - "work/logs/trace/c-to-rust/unsafe-ratio.json"
  required_sections:
    - "semantic gate"
    - "repair loop"
